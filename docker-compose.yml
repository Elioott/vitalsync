version: "3.9"

services:
  backend:
    build: ./backend
    container_name: vitalsync-backend
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=database
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
    depends_on:
      - database
    networks:
      - vitalsync-network

  frontend:
    build: ./frontend
    container_name: vitalsync-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - vitalsync-network

  database:
    image: postgres:15-alpine
    container_name: vitalsync-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - vitalsync-network

volumes:
  db-data:

networks:
  vitalsync-network:
    driver: bridge