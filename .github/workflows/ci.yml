name: VitalSync CI/CD

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: ./backend
        run: npm install

      - name: Run tests
        working-directory: ./backend
        run: npm test

      - name: Run ESLint
        working-directory: ./backend
        run: npx eslint . || true


      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build backend image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/vitalsync-backend:${{ github.sha }} ./backend

      - name: Build frontend image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/vitalsync-frontend:${{ github.sha }} ./frontend

      - name: Push backend image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/vitalsync-backend:${{ github.sha }}

      - name: Push frontend image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/vitalsync-frontend:${{ github.sha }}


      - name: Run docker-compose
        run: docker-compose up -d

      - name: Wait for backend
        run: sleep 10

      - name: Health check
        run: |
          curl -f http://localhost:3000/health || exit 1